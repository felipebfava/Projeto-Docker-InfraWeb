version: "3.9"

services:

  postgres:
    image: postgres:15-alpine

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend-service:

    build: ./backend

    env_file:
      - .env

    ports:
      - "3000:3000"

    depends_on:
      - postgres

  frontend:

    build: ./frontend

    ports:
      - "3005:80"

    depends_on:
      - backend-service

volumes:
  postgres_data: